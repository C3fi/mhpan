font_family monospace
font_size 11

# Отключаем всякие экспериментальные штуки
gpu_offload never
# или попробуй: gpu_offload always

background_opacity 1.0


foreground #929181
background #22221b
selection_foreground #929181
selection_background #302f27


#: Cursor colors

cursor #929181
cursor_text_color #22221b


#: URL underline color when hovering with mouse

url_color #a5980d


#: kitty window border colors and terminal bell colors

active_border_color #6c6b5a
inactive_border_color #22221b
bell_border_color #ae7313
visual_bell_color none


#: OS Window titlebar colors

wayland_titlebar_color #302f27
macos_titlebar_color #302f27


#: Tab bar colors

active_tab_foreground #e7e6df
active_tab_background #22221b
inactive_tab_foreground #929181
inactive_tab_background #302f27
tab_bar_background #302f27
tab_bar_margin_color none


#: Colors for marks (marked text in the terminal)

mark1_foreground #22221b
mark1_background #e7e6df
mark2_foreground #22221b
mark2_background #a5980d
mark3_foreground #22221b
mark3_background #7d9726


#: The basic 16 colors

#: black
color0 #22221b
color8 #6c6b5a

#: red
color1 #ba6236
color9 #ae7313

#: green
color2 #7d9726
color10 #302f27

#: yellow
color3 #a5980d
color11 #5f5e4e

#: blue
color4 #36a166
color12 #878573

#: magenta
color5 #5f9182
color13 #e7e6df

#: cyan
color6 #5b9d48
color14 #9d6c7c

#: white
color7 #929181
color15 #f4f3ec


background_opacity 0.70

# Открыть новое окно (сплит)
map ctrl+shift+enter new_window
map ctrl+shift+o new_os_window

# Навигация по сплитам
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

# Изменение размера сплитов
map ctrl+shift+left   resize_window left 10
map ctrl+shift+right  resize_window right 10
map ctrl+shift+up     resize_window up 10
map ctrl+shift+down   resize_window down 10

# Увеличение/уменьшение шрифта
map ctrl+plus  change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0     change_font_size all 0

# Автоматический тайлинг при создании нового окна
enabled_layouts tall,stack
layout tall

# Клавиши для переключения макетов
map ctrl+shift+t    goto_layout tall
map ctrl+shift+s    goto_layout stack
map ctrl+shift+f    goto_layout fat